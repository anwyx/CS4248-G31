model_name: "Robertp423/Qwen3-VL-4B-Construct"
fallback_model_name: "Qwen/Qwen3-VL-4B-Instruct"
model_output_dir: "outputs/stage_b_model"
device_map: "auto"
dtype: "bfloat16"
use_lora: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"
train_jsonl: ""
val_jsonl: ""
test_jsonl: ""
oracle_target_mode: true
predicted_stage_a_jsonl: ""
train_split_ratio: 0.8
eval_split_ratio: 0.1
train_batch_size: 2
eval_batch_size: 2
grad_accum_steps: 8
learning_rate: 0.0001
num_epochs: 3
weight_decay: 0.01
max_new_tokens: 64
num_candidates: 5
temperature: 0.8
top_p: 0.9
vehicle_penalty_weight: 1.0
ocr_penalty_weight: 0.5
title_penalty_weight: 0.5
seed: 42
